name: Generate uv lock

on:
  push:
    branches:
      - integration/01-green-baseline

permissions:
  contents: write

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/01-green-baseline
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate lock file
        run: uv lock

      - name: Commit lock file when changed
        run: |
          if [ -z "$(git status --porcelain -- uv.lock)" ]; then
            echo "uv.lock is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: lock project dependencies"
          git push origin HEAD:integration/01-green-baseline
