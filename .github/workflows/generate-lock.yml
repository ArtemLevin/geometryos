name: Generate uv lock

on:
  push:
    branches:
      - integration/01-green-baseline
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate lock file
        run: uv lock

      - name: Upload uv.lock
        uses: actions/upload-artifact@v4
        with:
          name: uv-lock
          path: uv.lock
          if-no-files-found: error
          retention-days: 1
