name: Apply PR 7 README update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'integration/07-openapi-consumer-contract'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Patch README
        run: python scripts/_patch_pr7_readme.py
      - name: Remove temporary automation
        run: rm -f scripts/_patch_pr7_readme.py .github/workflows/pr7-readme.yml
      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: publish TutorBoard consumer workflow"
          git push origin HEAD:${{ github.head_ref }}
