name: Apply PR 2 documentation correction

on:
  push:
    branches:
      - integration/02-gir-schema-v02

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/02-gir-schema-v02
      - name: Correct canonical GIR field name
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("CODEREVIEW_SKILL.md")
          text = path.read_text(encoding="utf-8")
          old = "version / scene_type / objects / constraints / construction_steps / metadata сохранены?"
          new = "schema_version / scene_type / objects / constraints / construction_steps / metadata сохранены?"
          if old not in text:
              raise SystemExit("expected review checklist line not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/apply-pr2-doc-fix.yml").unlink()
          PY
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: use the canonical GIR schema_version field"
          git push origin HEAD:integration/02-gir-schema-v02
