name: Generate PR 7 contract artifacts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'integration/07-openapi-consumer-contract'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install locked Python dependencies
        run: uv sync --frozen --dev

      - name: Generate OpenAPI and TutorBoard fixtures
        run: |
          uv run python scripts/export_openapi.py
          uv run python scripts/export_tutorboard_contracts.py

      - name: Generate npm lock
        working-directory: contracts/tutorboard/typescript
        run: |
          set -o pipefail
          npm install --package-lock-only --ignore-scripts 2>&1 | tee npm-lock.log

      - name: Upload npm diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr7-npm-lock-log
          path: contracts/tutorboard/typescript/npm-lock.log

      - name: Format Python
        run: uv run ruff format .

      - name: Remove temporary automation
        run: rm -f .github/pr7-trigger .github/workflows/pr7-apply.yml contracts/tutorboard/typescript/npm-lock.log

      - name: Commit generated contract baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: generate OpenAPI and TutorBoard contract baseline"
          git push origin HEAD:${{ github.head_ref }}
