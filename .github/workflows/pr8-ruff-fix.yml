name: PR8 Ruff Fix

on:
  push:
    branches:
      - release/geometryos-0.2.0
    paths:
      - .github/pr8-ruff-fix.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/geometryos-0.2.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --disable-pip-version-check uv==0.11.29
      - run: uv sync --frozen --dev

      - name: Resolve the structural Ruff finding
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/build_release.py")
          text = path.read_text(encoding="utf-8")
          old = '''    with archive_path.open("wb") as raw:
                  with gzip.GzipFile(filename="", mode="wb", fileobj=raw, mtime=0) as compressed:
                      with tarfile.open(fileobj=compressed, mode="w") as archive:
                          for path in sorted(CONTRACT_ROOT.rglob("*")):
                              if not path.is_file():
                                  continue
                              relative = Path("tutorboard") / "v1" / path.relative_to(CONTRACT_ROOT)
                              info = archive.gettarinfo(str(path), arcname=relative.as_posix())
                              info.uid = 0
                              info.gid = 0
                              info.uname = ""
                              info.gname = ""
                              info.mtime = 0
                              with path.open("rb") as source:
                                  archive.addfile(info, source)
          '''
          new = '''    with (
                  archive_path.open("wb") as raw,
                  gzip.GzipFile(filename="", mode="wb", fileobj=raw, mtime=0) as compressed,
                  tarfile.open(fileobj=compressed, mode="w") as archive,
              ):
                  for path in sorted(CONTRACT_ROOT.rglob("*")):
                      if not path.is_file():
                          continue
                      relative = Path("tutorboard") / "v1" / path.relative_to(CONTRACT_ROOT)
                      info = archive.gettarinfo(str(path), arcname=relative.as_posix())
                      info.uid = 0
                      info.gid = 0
                      info.uname = ""
                      info.gname = ""
                      info.mtime = 0
                      with path.open("rb") as source:
                          archive.addfile(info, source)
          '''
          if old not in text:
              raise SystemExit("Expected nested context block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - run: uv run ruff check --fix .
      - run: uv run ruff format .

      - name: Remove one-time fixer and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/pr8-ruff-fix.trigger
          rm -f .github/workflows/pr8-ruff-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "style: apply canonical Ruff fixes for PR 8"
          git push origin HEAD:release/geometryos-0.2.0
