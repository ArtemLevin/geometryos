name: PR8 Release Import Fix

on:
  push:
    branches:
      - release/geometryos-0.2.0
    paths:
      - .github/pr8-import-fix.trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/geometryos-0.2.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --disable-pip-version-check uv==0.11.29
      - run: uv sync --frozen --dev

      - name: Normalize release-tool imports
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "scripts/print_version.py",
              "from __future__ import annotations\n\nfrom release_common import project_version",
              "from __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nfrom scripts.release_common import project_version  # noqa: E402",
          )
          replace_once(
              "scripts/export_release_manifest.py",
              "from pathlib import Path\n\nfrom release_common import RELEASE_MANIFEST_PATH, canonical_json, release_manifest",
              "from pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nfrom scripts.release_common import (  # noqa: E402\n    RELEASE_MANIFEST_PATH,\n    canonical_json,\n    release_manifest,\n)",
          )
          replace_once(
              "scripts/check_release_version.py",
              "from release_common import (  # noqa: E402",
              "from scripts.release_common import (  # noqa: E402",
          )
          replace_once(
              "scripts/build_release.py",
              "import shutil\nimport subprocess",
              "import shutil\nimport subprocess\nimport sys",
          )
          replace_once(
              "scripts/build_release.py",
              "from generate_python_sbom import generate_sbom\nfrom release_common import (",
              "ROOT_PATH = Path(__file__).resolve().parents[1]\nif str(ROOT_PATH) not in sys.path:\n    sys.path.insert(0, str(ROOT_PATH))\n\nfrom scripts.generate_python_sbom import generate_sbom  # noqa: E402\nfrom scripts.release_common import (  # noqa: E402",
          )
          replace_once(
              "scripts/release_smoke.py",
              "import tarfile\nfrom pathlib import Path\n\nfrom release_common import (",
              "import tarfile\nimport sys\nfrom pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nfrom scripts.release_common import (  # noqa: E402",
          )
          replace_once(
              "scripts/extract_release_notes.py",
              "from pathlib import Path\n\nfrom release_common import CHANGELOG_PATH, project_version",
              "from pathlib import Path\n\nROOT = Path(__file__).resolve().parents[1]\nif str(ROOT) not in sys.path:\n    sys.path.insert(0, str(ROOT))\n\nfrom scripts.release_common import CHANGELOG_PATH, project_version  # noqa: E402",
          )
          PY

      - run: uv run ruff check --fix .
      - run: uv run ruff format .

      - name: Remove one-time fixer and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/pr8-import-fix.trigger
          rm -f .github/workflows/pr8-import-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "refactor(release): normalize release tooling imports"
          git push origin HEAD:release/geometryos-0.2.0
