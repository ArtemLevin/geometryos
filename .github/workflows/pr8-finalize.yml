name: PR8 Finalize

on:
  push:
    branches:
      - release/geometryos-0.2.0
    paths:
      - .github/pr8-finalize.trigger

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/geometryos-0.2.0
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check uv==0.11.29

      - name: Update release-facing documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:80]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          def append_once(path: str, marker: str, block: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if marker not in text:
                  target.write_text(text.rstrip() + "\n\n" + block.strip() + "\n", encoding="utf-8")

          replace_once(
              "README.md",
              "# GIR — Geometry Intermediate Representation\n\nGIR is a Python-first geometry compiler skeleton. Text is converted into draft GIR, validated, normalized, laid out through the canonical MVP layout, and rendered to SVG or TikZ. The LLM is never the source of truth: GIR is.",
              "# GeometryOS 0.2.0\n\nGeometryOS is a GIR-first geometry compiler service. Text is converted into draft GIR, validated, normalized, laid out through the canonical MVP layout, and rendered to SVG or TikZ. The LLM is never the source of truth: GIR is.",
          )
          replace_once(
              "README.md",
              "See `contracts/tutorboard/v1/README.md` and `docs/adr/ADR-006-published-openapi-and-consumer-contract.md`.\n\n## Requirements",
              "See `contracts/tutorboard/v1/README.md` and `docs/adr/ADR-006-published-openapi-and-consumer-contract.md`.\n\n## GeometryOS 0.2.0 release\n\nThe service/package version is `0.2.0`; HTTP API v1 remains `1.0.0`, GIR remains `0.2.0`, and the TutorBoard contract remains `tutorboard/v1`. Release assets include wheel, source distribution, schemas, executable contracts, SHA-256 checksums and a CycloneDX SBOM. The hardened image is published to `ghcr.io/artemlevin/geometryos` under immutable `0.2.0` and commit-SHA tags; no mutable `latest` tag is produced.\n\n```bash\ngir --version\nmake version-check\nmake release-all\n```\n\nSee `CHANGELOG.md`, `docs/INTEGRATION_GUIDE.md`, `docs/ERROR_MODEL.md`, `docs/RELEASE_PROCESS.md` and `docs/adr/ADR-007-versioning-and-release-publication.md`.\n\n## Requirements",
          )
          replace_once(
              "README.md",
              "- OpenAPI v1 and TutorBoard fixture freshness checks;\n- benchmark suites;",
              "- OpenAPI v1 and TutorBoard fixture freshness checks;\n- release manifest freshness and version consistency checks;\n- benchmark suites;",
          )
          replace_once(
              "README.md",
              "7. starts the installed `gir --help` console entrypoint.",
              "7. starts the installed `gir --help` console entrypoint;\n8. verifies the exact installed `gir --version` output.",
          )
          replace_once(
              "README.md",
              "make consumer-typescript\nmake api",
              "make consumer-typescript\nmake version-check\nmake release-manifest-check\nmake dependency-audit\nmake release-build\nmake release-smoke\nmake release-all\nmake api",
          )
          replace_once(
              "README.md",
              "```bash\ngir validate benchmarks/text_to_gir/altitude/altitude_001.expected.gir.json",
              "```bash\ngir --version\ngir validate benchmarks/text_to_gir/altitude/altitude_001.expected.gir.json",
          )
          replace_once(
              "README.md",
              "GitHub Actions runs four gated jobs on pushes and pull requests:\n\n- `verify` installs dependencies from `uv.lock`, runs `make verify`, and checks OpenAPI compatibility with the base branch;\n- `package-smoke` independently builds and installs the wheel with `make package-smoke`;\n- `consumer-contract` executes TutorBoard fixtures, generates TypeScript types, and type-checks the smoke client;\n- `container-smoke` validates Compose, builds the hardened image and checks runtime security, probes, stable API behavior and graceful shutdown.\n\nAll jobs use Python 3.11, frozen dependency installation, read-only repository permissions and explicit timeouts. Pull-request CI builds but does not publish container images.",
              "GitHub Actions runs five gated jobs on pushes and pull requests:\n\n- `verify` installs dependencies from `uv.lock`, runs `make verify`, and checks OpenAPI compatibility with the base branch;\n- `package-smoke` independently builds and installs the wheel with `make package-smoke`;\n- `consumer-contract` executes TutorBoard fixtures, generates TypeScript types, and type-checks the smoke client;\n- `container-smoke` validates Compose, builds the hardened image and checks runtime security, probes, stable API behavior and graceful shutdown;\n- `release-dry-run` audits the frozen runtime graph, builds wheel and sdist, rebuilds from sdist, generates checksums/SBOM, smoke-tests the bundle and uploads a non-published candidate artifact.\n\nAll pull-request jobs use frozen dependency installation, read-only repository permissions and explicit timeouts. Publication occurs only from a matching immutable Git tag through `.github/workflows/release.yml`.",
          )

          replace_once(
              "docs/COMPATIBILITY.md",
              "| Python package | `0.1.0` | Distribution version until the release PR |",
              "| GeometryOS service/package | `0.2.0` | Semantic version of the release distribution |",
          )
          replace_once(
              "docs/COMPATIBILITY.md",
              "Until the release PR, the Docker image is an integration artifact rather than a published versioned release. The following deployment properties are nevertheless protected by review and CI:",
              "GeometryOS `0.2.0` publishes a versioned GHCR image. The full SemVer tag and Git tag are immutable; deployments should prefer the image digest. The following deployment properties are protected by review and CI:",
          )
          append_once(
              "docs/COMPATIBILITY.md",
              "## Release artifact compatibility",
              """
              ## Release artifact compatibility

              GeometryOS service releases follow Semantic Versioning independently from API, GIR and TutorBoard contracts. `pyproject.toml` is the canonical service-version source; `release/manifest.json`, OpenAPI service metadata, OCI labels, CLI output and release filenames must match it.

              Versioned Git tags, GitHub Release assets and full SemVer container tags are immutable. A defective release is replaced by a patch release, never rewritten. The compatible minor image tag may advance only after the patch digest passes the complete registry smoke and release gates.
              """,
          )

          replace_once(
              "docs/contracts/API_CONTRACT.md",
              "| Python package | `0.1.0` until the release PR |",
              "| GeometryOS service/package | `0.2.0` |",
          )
          replace_once(
              "docs/contracts/API_CONTRACT.md",
              "These versions evolve independently.",
              "These versions evolve independently. OpenAPI additionally publishes `x-geometryos-service-version: 0.2.0`; changing the service version does not rename API v1 or alter GIR `0.2.0`.",
          )

          replace_once("docs/operations/DEPLOYMENT.md", "BUILD_VERSION=0.1.0", "BUILD_VERSION=0.2.0")
          replace_once("docs/operations/DEPLOYMENT.md", "BUILD_VERSION=0.1.0", "BUILD_VERSION=0.2.0")
          replace_once(
              "docs/operations/DEPLOYMENT.md",
              "| `GEOMETRYOS_BUILD_VERSION` | `0.1.0` | OCI version label |",
              "| `GEOMETRYOS_BUILD_VERSION` | `0.2.0` | OCI version label |",
          )
          replace_once(
              "docs/operations/DEPLOYMENT.md",
              "This deployment does not include TLS, a reverse proxy, authentication, rate limiting, Kubernetes resources, metrics, tracing or registry publication.",
              "This deployment does not include TLS, a reverse proxy, authentication, rate limiting, Kubernetes resources, metrics or tracing. GeometryOS `0.2.0` is published to GHCR after tag verification and registry smoke.",
          )
          replace_once(
              "docs/operations/DEPLOYMENT.md",
              "- no registry publication or signed image;",
              "- the first published image target is `linux/amd64`;",
          )
          append_once(
              "docs/operations/DEPLOYMENT.md",
              "## Published release image",
              """
              ## Published release image

              GeometryOS `0.2.0` is published as `ghcr.io/artemlevin/geometryos:0.2.0` and `sha-<commit>`. Production deployments should pin `ghcr.io/artemlevin/geometryos@sha256:<digest>`. The workflow tests the registry digest before assigning SemVer aliases and does not publish `latest`.

              Release and rollback details are documented in `docs/RELEASE_PROCESS.md`.
              """,
          )

          append_once(
              "contracts/tutorboard/v1/README.md",
              "## Release binding",
              """
              ## Release binding

              GeometryOS `0.2.0` ships this unchanged `tutorboard/v1` contract together with `schemas/openapi.v1.json` in the GitHub Release bundle. Consumers should pin the release asset or container digest; the contract version does not implicitly follow the service SemVer.
              """,
          )

          append_once(
              "CODEREVIEW_SKILL.md",
              "# Release review addendum",
              """
              # Release review addendum

              For a release PR additionally verify:

              - `pyproject.toml`, CLI, OpenAPI service metadata, Docker/Compose defaults, changelog and release manifest agree on the service version;
              - API v1, GIR `0.2.0` and TutorBoard v1 remain independently versioned;
              - wheel and sdist are both built, and the wheel is reproducible from the sdist;
              - the release bundle contains only expected versioned assets, valid checksums and a CycloneDX SBOM;
              - PR CI performs a non-publishing release dry-run;
              - tag publication tests the GHCR digest before SemVer promotion;
              - full SemVer tags are immutable and no `latest` or PyPI publication is introduced implicitly;
              - rollback and release-withdrawal procedures are documented.
              """,
          )
          PY

      - name: Resolve locked dependencies
        run: uv lock

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Apply canonical formatting
        run: uv run ruff format .

      - name: Regenerate committed machine artifacts
        run: |
          uv run python scripts/export_openapi.py
          uv run python scripts/export_tutorboard_contracts.py
          uv run python scripts/export_release_manifest.py

      - name: Remove one-time finalizer
        run: |
          rm -f .github/pr8-finalize.trigger
          rm -f .github/workflows/pr8-finalize.yml

      - name: Commit finalized release candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): finalize GeometryOS 0.2.0 artifacts"
          git push origin HEAD:release/geometryos-0.2.0
