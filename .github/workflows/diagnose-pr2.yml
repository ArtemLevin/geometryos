name: Diagnose PR 2

on:
  push:
    branches:
      - integration/02-gir-schema-v02
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --frozen --dev
      - name: Capture verification output
        run: |
          set +e
          make verify 2>&1 | tee verify.log
          echo ${PIPESTATUS[0]} > verify.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr2-verify-log
          path: |
            verify.log
            verify.exit
          retention-days: 1
