name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Format diagnostic file
        run: uv run ruff format tests/api/test_v1_openapi_legacy.py

      - name: Verify
        run: |
          set -o pipefail
          make verify 2>&1 | tee verify.log

      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr4-verify-diagnostics
          path: |
            verify.log
            tests/api/test_v1_openapi_legacy.py

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Test built wheel
        run: make package-smoke
