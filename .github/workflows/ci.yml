name: CI

on:
  push:
    branches:
      - integration/09-tutorboard-http-contract

permissions:
  contents: write

concurrency:
  group: finalize-pr9-trusted
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/09-tutorboard-http-contract
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install locked dependencies
        run: uv sync --frozen --dev
      - name: Remove one-shot files
        run: rm -f scripts/implement_pr9.py .pr9-trigger .github/workflows/implement-pr9.yml
      - name: Regenerate contracts
        run: |
          uv run python scripts/export_openapi.py
          uv run python scripts/export_tutorboard_contracts.py
      - name: Format and verify
        run: |
          uv run ruff format .
          make verify
      - name: Verify generated TypeScript
        run: |
          npm ci --prefix contracts/tutorboard/typescript
          npm run --prefix contracts/tutorboard/typescript generate
          npm run --prefix contracts/tutorboard/typescript typecheck
      - name: Validate Compose
        run: docker compose config --quiet
      - name: Commit verified result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: regenerate PR 9 contracts'
          git push origin HEAD:integration/09-tutorboard-http-contract
