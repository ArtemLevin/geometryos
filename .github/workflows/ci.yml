name: CI

on:
  push:
    branches:
      - integration/09-tutorboard-http-contract
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: finalize-pr9-trusted-${{ github.ref }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/09-tutorboard-http-contract
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install locked dependencies
        run: uv sync --frozen --dev
      - name: Prepare generated contracts
        run: |
          rm -f scripts/implement_pr9.py .pr9-trigger
          uv run python scripts/export_openapi.py
          uv run python scripts/export_tutorboard_contracts.py
          uv run ruff format .
      - name: Run verification and capture diagnostic
        id: verify
        shell: bash
        run: |
          set +e
          make verify > pr9-diagnostic.log 2>&1
          status=$?
          tail -n 200 pr9-diagnostic.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit generated files and diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: capture PR 9 verification result'
          git push origin HEAD:integration/09-tutorboard-http-contract
      - name: Fail when verification failed
        if: steps.verify.outputs.status != '0'
        run: exit 1
      - name: Verify generated TypeScript
        run: |
          npm ci --prefix contracts/tutorboard/typescript
          npm run --prefix contracts/tutorboard/typescript generate
          npm run --prefix contracts/tutorboard/typescript typecheck
      - name: Validate Compose
        run: docker compose config --quiet
