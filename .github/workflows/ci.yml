name: PR 10 Finalizer

on:
  push:
    branches:
      - integration/10-layout-contract-v01

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/10-layout-contract-v01
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Finalize Layout Contract 0.1
        run: uv run python .github/pr10_finalize.py
