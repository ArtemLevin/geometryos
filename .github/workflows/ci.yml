name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Verify
        run: |
          set -o pipefail
          make verify 2>&1 | tee verify.log

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr6-verify-log
          path: verify.log

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Test built wheel
        run: make package-smoke

  container-smoke:
    needs:
      - verify
      - package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build and smoke-test image
        run: >-
          uv run python scripts/container_smoke.py
          --image geometryos:${GITHUB_SHA}
          --revision ${GITHUB_SHA}
          --version 0.1.0
