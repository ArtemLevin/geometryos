name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr9-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr9-implement:
    if: github.ref_name == 'integration/09-consumer-http-contract' || github.head_ref == 'integration/09-consumer-http-contract'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: integration/09-consumer-http-contract
          fetch-depth: 0

      - name: Detect pending implementation
        id: implementation
        shell: bash
        run: |
          if [[ -f scripts/pr9_implement.py && ! -f pr9-diagnostic.log ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.implementation.outputs.required == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        if: steps.implementation.outputs.required == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        if: steps.implementation.outputs.required == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: contracts/tutorboard/typescript/package-lock.json

      - name: Install locked dependencies
        if: steps.implementation.outputs.required == 'true'
        run: uv sync --frozen --dev

      - name: Correct generator escaping
        if: steps.implementation.outputs.required == 'true'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/pr9_implement.py")
          content = path.read_text(encoding="utf-8")
          old = 'sort_keys=True) + "\\n"'
          new = 'sort_keys=True) + "\\\\n"'
          if content.count(old) != 1:
              raise SystemExit(f"Expected one generator newline literal, found {content.count(old)}")
          path.write_text(content.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Apply, format, and regenerate with diagnostic capture
        if: steps.implementation.outputs.required == 'true'
        id: apply
        shell: bash
        run: |
          set +e
          set -o pipefail
          {
            uv run python scripts/pr9_implement.py
            rm -f noop noop2 noop3 noop4
            uv run ruff format .
            uv run python scripts/export_openapi.py
            uv run python scripts/export_tutorboard_contracts.py
          } 2>&1 | tee /tmp/pr9-implementation.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish exact implementation diagnostic
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status != '0'
        shell: bash
        run: |
          git reset --hard HEAD
          tail -n 260 /tmp/pr9-implementation.log > pr9-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr9-diagnostic.log
          git commit -m "chore: capture PR 9 implementation diagnostic"
          git push origin HEAD:integration/09-consumer-http-contract

      - name: Stop after diagnostic publication
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status != '0'
        run: exit 1

      - name: Run targeted PR 9 tests
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status == '0'
        run: |
          uv run pytest tests/api/test_cors.py tests/api/test_pr9_settings.py tests/api/test_service_unavailable.py
          uv run pytest tests/contracts/test_pr9_openapi_contract.py tests/contracts/test_pr9_openapi_compatibility.py

      - name: Run canonical source verification
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status == '0'
        run: make verify

      - name: Verify package and consumer generation
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status == '0'
        run: |
          make package-smoke
          make consumer-typescript

      - name: Verify deployment boundary
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status == '0'
        run: |
          docker compose config --quiet
          make container-smoke
          make dependency-audit

      - name: Publish only verified product changes
        if: steps.implementation.outputs.required == 'true' && steps.apply.outputs.status == '0'
        shell: bash
        run: |
          rm -f pr9-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows/**'
          git commit -m "feat: harden TutorBoard browser HTTP contract"
          git push origin HEAD:integration/09-consumer-http-contract
