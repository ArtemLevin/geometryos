name: Apply GIR 0.2 migration

on:
  push:
    branches:
      - integration/02-gir-schema-v02

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/02-gir-schema-v02

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Apply migration
        run: uv run python scripts/apply_pr2.py

      - name: Format and fix imports
        run: |
          uv run ruff check --fix .
          uv run ruff format .

      - name: Export GIR 0.2 schema
        run: uv run python scripts/export_schema.py

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: formalize GIR 0.2 schema and legacy compatibility"
          git push origin HEAD:integration/02-gir-schema-v02
