name: PR 5 format fixes

on:
  push:
    branches:
      - integration/05-api-resilience
    paths:
      - scripts/trigger_pr5_format.txt

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/05-api-resilience

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Format files
        run: uv run ruff format src/gir_api/logging.py tests/api/test_v1_openapi_legacy.py

      - name: Remove one-shot files
        run: |
          rm scripts/trigger_pr5_format.txt
          rm .github/workflows/pr5-format.yml

      - name: Commit formatting
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: format API resilience files'
          git push
