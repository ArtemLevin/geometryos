name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and verify artifacts without publishing"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/artemlevin/geometryos
  UV_VERSION: "0.11.29"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      revision: ${{ steps.metadata.outputs.revision }}
      publish: ${{ steps.metadata.outputs.publish }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(python scripts/print_version.py)
          TAG="v${VERSION}"
          REVISION=$(git rev-parse HEAD)
          PUBLISH=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${TAG}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${TAG}." >&2
              exit 1
            fi
            PUBLISH=true
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "publish=${PUBLISH}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag belongs to main
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Verify version and changelog
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/check_release_version.py --expected-tag "${{ steps.metadata.outputs.tag }}"
          uv run python scripts/extract_release_notes.py \
            --version "${{ steps.metadata.outputs.version }}" \
            --output /tmp/RELEASE_NOTES.md

  verify:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Install locked Python dependencies
        run: uv sync --frozen --dev

      - name: Run canonical source verification
        run: make verify

      - name: Test installed wheel
        run: make package-smoke

      - name: Execute TutorBoard Python contracts
        run: make consumer-contract

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: contracts/tutorboard/typescript/package-lock.json

      - name: Generate and type-check TutorBoard client contract
        run: make consumer-typescript

      - name: Audit frozen runtime dependencies
        run: make dependency-audit

  build-release:
    needs:
      - validate
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Build and smoke-test release bundle
        run: |
          make release-build
          make release-smoke

      - name: Add release notes to workflow artifact
        run: |
          uv run python scripts/extract_release_notes.py \
            --version "${{ needs.validate.outputs.version }}" \
            --output "dist/release/${{ needs.validate.outputs.version }}/RELEASE_NOTES.md"

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: geometryos-${{ needs.validate.outputs.version }}-release
          path: dist/release/${{ needs.validate.outputs.version }}/
          if-no-files-found: error
          retention-days: 30

  publish-container:
    if: needs.validate.outputs.publish == 'true'
    needs:
      - validate
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Sign in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and publish SHA image
        id: image
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REVISION: ${{ needs.validate.outputs.revision }}
        run: |
          set -euo pipefail
          SHA_TAG="${IMAGE}:sha-${REVISION}"
          docker buildx build \
            --platform linux/amd64 \
            --build-arg "BUILD_REVISION=${REVISION}" \
            --build-arg "BUILD_VERSION=${VERSION}" \
            --tag "${SHA_TAG}" \
            --provenance=mode=max \
            --sbom=true \
            --push \
            --metadata-file /tmp/image-metadata.json \
            .
          DIGEST=$(python - <<'PY'
          import json
          metadata = json.load(open('/tmp/image-metadata.json', encoding='utf-8'))
          print(metadata['containerimage.digest'])
          PY
          )
          echo "sha_tag=${SHA_TAG}" >> "${GITHUB_OUTPUT}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Pull published digest
        run: docker pull "${IMAGE}@${{ steps.image.outputs.digest }}"

      - name: Smoke-test published digest
        shell: bash
        run: |
          uv run python scripts/container_smoke.py \
            --skip-build \
            --image "${IMAGE}@${{ steps.image.outputs.digest }}" \
            --revision "${{ needs.validate.outputs.revision }}" \
            --version "${{ needs.validate.outputs.version }}"

      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.image.outputs.digest }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Attest published image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Promote tested digest to SemVer tags
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          MINOR=${VERSION%.*}
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:${MINOR}" \
            "${IMAGE}@${{ steps.image.outputs.digest }}"

  publish-release:
    if: needs.validate.outputs.publish == 'true'
    needs:
      - validate
      - build-release
      - publish-container
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download release bundle
        uses: actions/download-artifact@fc02353415da80201a0da48ab47022efd7725d11
        with:
          name: geometryos-${{ needs.validate.outputs.version }}-release
          path: release-assets

      - name: Verify downloaded checksums
        shell: bash
        working-directory: release-assets
        run: sha256sum --check SHA256SUMS

      - name: Attest release files
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            release-assets/*.whl
            release-assets/*.tar.gz
            release-assets/*.json
            release-assets/SHA256SUMS

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t ASSETS < <(
            find release-assets -maxdepth 1 -type f \
              ! -name RELEASE_NOTES.md \
              -print | sort
          )
          gh release create "${TAG}" "${ASSETS[@]}" \
            --verify-tag \
            --title "GeometryOS ${VERSION}" \
            --notes-file release-assets/RELEASE_NOTES.md
