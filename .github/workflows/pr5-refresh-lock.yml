name: PR 5 finalize documentation

on:
  push:
    branches:
      - integration/05-api-resilience
    paths:
      - scripts/finalize_pr5_docs.py

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/05-api-resilience

      - name: Apply documentation updates
        run: python scripts/finalize_pr5_docs.py

      - name: Remove one-shot files
        run: |
          rm scripts/finalize_pr5_docs.py
          rm .github/workflows/pr5-refresh-lock.yml

      - name: Commit documentation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: integrate API resilience guidance'
          git push
