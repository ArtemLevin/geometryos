name: PR 5 refresh lock

on:
  push:
    branches:
      - integration/05-api-resilience
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/05-api-resilience

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh lock file
        run: uv lock

      - name: Commit lock file
        run: |
          if git diff --quiet -- uv.lock; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add uv.lock
          git commit -m 'build: refresh lock for API resilience'
          git push
