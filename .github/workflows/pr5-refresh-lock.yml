name: PR 5 apply implementation

on:
  push:
    branches:
      - integration/05-api-resilience
    paths:
      - scripts/apply_pr5.py

permissions:
  contents: write

jobs:
  apply-pr5:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/05-api-resilience

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply API resilience implementation
        run: python scripts/apply_pr5.py

      - name: Refresh dependency lock
        run: uv lock

      - name: Remove one-shot migration files
        run: |
          rm scripts/apply_pr5.py
          rm .github/workflows/pr5-refresh-lock.yml

      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(api): add resilience timeouts and request context'
          git push
