name: PR 6 formatter

on:
  push:
    branches:
      - integration/06-container-readiness
    paths:
      - .pr6-format

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/06-container-readiness

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: uv sync --frozen --dev

      - name: Apply Ruff formatting
        run: >-
          uv run ruff format
          scripts/container_smoke.py
          src/gir_api/readiness.py
          tests/api/test_v1_openapi_legacy.py

      - name: Remove one-shot formatter
        run: rm -f .pr6-format .github/workflows/pr6-format.yml

      - name: Commit formatted files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/container_smoke.py src/gir_api/readiness.py tests/api/test_v1_openapi_legacy.py .github/workflows/pr6-format.yml .pr6-format
          git commit -m 'style: apply canonical PR 6 formatting'
          git push
